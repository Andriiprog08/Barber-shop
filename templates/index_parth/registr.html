<section>
    
    <div class="registrContainer">
        <h2 class="titleBlocks">Come to us</h2>
        <div>
            <h3 class="subtitleBlock">We are waiting for you</h3>
        
            <div>
                <form action="">
                    <p>
                        <label for="name">Name</label>
                        <input type="text" id="name" required>
                    </p>
        
                    <p>
                        <label for="surname">Surname</label>
                        <input type="text" id="surname" required>
                    </p>
        
                    <p>
                        <label for="telNumber">Phone number</label>
                        <input type="tel" id="telNumber" required>
                    </p>
        
                    <p>
                        <label for="messageforAdmin">Messages</label>
                        <textarea id="messageforAdmin" name="message" rows="8" cols="50" placeholder="Write the text..." required></textarea>
                    </p>
        
                    <p>
                        <button id="registrBtn" type="submit">Send</button>
                    </p>
                </form>
            </div>
        </div>
    
        <div class="location">
            <h3 class="subtitleBlock">Our location</h3>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2244.441419644714!2d37.61729931607909!3d55.75582698055386!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x46b54aab8c9e5b7b%3A0x9>d9c8e5b1a0b8e!2z0JrQvtC70YzQvdCw0L3QsNGPINC_0L7RgNC-0YHQutCw!5e0!3m2!1sru!2sru!4v1700000000000!5m2!1sru!2sru" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    
        </div>
    
    </div>

</section>
